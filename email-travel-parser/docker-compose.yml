services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8042}:8042"
    volumes:
      - ./credentials.json:/app/credentials.json:ro
      - msgvault_home:/root/.msgvault
      - app_data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3042}
      MSGVAULT_HOME: /root/.msgvault
      OLLAMA_HOST: http://ollama:11434
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-minimax/minimax-m1}
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8042}
        NEXT_OUTPUT: standalone
    ports:
      - "${FRONTEND_PORT:-3042}:3042"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # One-off init container: pulls nomic-embed-text on first deploy, then exits.
  ollama-init:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: "ollama pull nomic-embed-text"
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

volumes:
  msgvault_home:
  ollama_data:
  app_data:
