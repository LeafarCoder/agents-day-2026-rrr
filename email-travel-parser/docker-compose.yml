services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8042}:8042"
    volumes:
      - ./credentials.json:/app/credentials.json:ro
      - msgvault_home:/root/.msgvault
      - app_data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3042}
      MSGVAULT_HOME: /root/.msgvault
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8042}
        NEXT_OUTPUT: standalone
    ports:
      - "${FRONTEND_PORT:-3042}:3042"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    restart: unless-stopped

volumes:
  msgvault_home:
  ollama_data:
  app_data:
